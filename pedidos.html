<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Pedidos - CRM Grupo Gloria</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <a class="volver" href="dashboard.html">&larr; Volver al Dashboard</a>

    <h2>Gestión de Pedidos</h2>

    <form id="formPedido" onsubmit="return guardarPedido(event)">

        <label>Cliente</label>
        <select id="cliente" required></select>

        <label>Producto</label>
        <select id="producto">
            <option>Leche Gloria</option>
            <option>Yogurt Gloria</option>
            <option>Queso Gloria</option>
            <option>Leche Evaporada Gloria</option>
            <option>Mantequilla Gloria</option>
        </select>

        <label>Cantidad</label>
        <input type="number" id="cantidad" min="1" value="1" required oninput="calcularTotal()">

        <label>Precio Unitario (S/)</label>
        <input type="number" id="precio" min="0" step="0.10" required oninput="calcularTotal()">

        <label>Total (S/)</label>
        <input type="text" id="total" readonly>

        <label>Vendedor</label>
        <input type="text" id="vendedor" placeholder="Nombre del vendedor" required>

        <label>Fecha de Pedido</label>
        <input type="date" id="fecha" required>

        <label>Estado</label>
        <select id="estado">
            <option>Pendiente</option>
            <option>En proceso</option>
            <option>Entregado</option>
            <option>Cancelado</option>
        </select>

        <label>Observaciones</label>
        <textarea id="observaciones"></textarea>

        <input type="hidden" id="editId">

        <button type="submit">Guardar Pedido</button>

    </form>

    <div class="filtros">
        <label>Filtrar por estado:</label>
        <select id="filtroEstado" onchange="renderTabla()">
            <option value="">Todos</option>
            <option>Pendiente</option>
            <option>En proceso</option>
            <option>Entregado</option>
            <option>Cancelado</option>
        </select>

        <label>Filtrar por vendedor:</label>
        <select id="filtroVendedor" onchange="renderTabla()">
            <option value="">Todos</option>
        </select>
    </div>

    <h3>Pedidos Registrados</h3>
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Producto</th>
                <th>Cant.</th>
                <th>Total</th>
                <th>Vendedor</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaPedidos"></tbody>
    </table>

</div>

<script>
const CLIENTES_KEY = "gloria_clientes";
const PEDIDOS_KEY = "gloria_pedidos";

function obtenerClientes() {
    return JSON.parse(localStorage.getItem(CLIENTES_KEY)) || [];
}

function obtenerPedidos() {
    return JSON.parse(localStorage.getItem(PEDIDOS_KEY)) || [];
}

function guardarPedidos(lista) {
    localStorage.setItem(PEDIDOS_KEY, JSON.stringify(lista));
}

function cargarClientesEnSelect() {
    const select = document.getElementById("cliente");
    const clientes = obtenerClientes();

    select.innerHTML = "";

    if (clientes.length === 0) {
        select.innerHTML = '<option value="">No hay clientes registrados</option>';
        return;
    }

    clientes.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.nombre;
        opt.textContent = c.nombre + " - " + c.documento;
        select.appendChild(opt);
    });
}

function calcularTotal() {
    const cantidad = Number(document.getElementById("cantidad").value) || 0;
    const precio = Number(document.getElementById("precio").value) || 0;
    document.getElementById("total").value = (cantidad * precio).toFixed(2);
}

function cargarFiltroVendedores() {
    const select = document.getElementById("filtroVendedor");
    const pedidos = obtenerPedidos();
    const vendedores = [...new Set(pedidos.map(p => p.vendedor))];

    select.innerHTML = '<option value="">Todos</option>';
    vendedores.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        select.appendChild(opt);
    });
}

function guardarPedido(e) {
    e.preventDefault();

    const editId = document.getElementById("editId").value;
    const cantidad = Number(document.getElementById("cantidad").value);
    const precio = Number(document.getElementById("precio").value);

    const pedido = {
        id: editId ? Number(editId) : Date.now(),
        cliente: document.getElementById("cliente").value,
        producto: document.getElementById("producto").value,
        cantidad: cantidad,
        precio: precio,
        total: cantidad * precio,
        vendedor: document.getElementById("vendedor").value,
        fecha: document.getElementById("fecha").value,
        estado: document.getElementById("estado").value,
        observaciones: document.getElementById("observaciones").value
    };

    let pedidos = obtenerPedidos();

    if (editId) {
        pedidos = pedidos.map(p => p.id === pedido.id ? pedido : p);
    } else {
        pedidos.push(pedido);
    }

    guardarPedidos(pedidos);
    document.getElementById("formPedido").reset();
    document.getElementById("editId").value = "";
    document.getElementById("total").value = "";
    cargarFiltroVendedores();
    renderTabla();

    return false;
}

function editarPedido(id) {
    const pedido = obtenerPedidos().find(p => p.id === id);
    if (!pedido) return;

    document.getElementById("cliente").value = pedido.cliente;
    document.getElementById("producto").value = pedido.producto;
    document.getElementById("cantidad").value = pedido.cantidad;
    document.getElementById("precio").value = pedido.precio;
    document.getElementById("total").value = pedido.total.toFixed(2);
    document.getElementById("vendedor").value = pedido.vendedor;
    document.getElementById("fecha").value = pedido.fecha;
    document.getElementById("estado").value = pedido.estado;
    document.getElementById("observaciones").value = pedido.observaciones;
    document.getElementById("editId").value = pedido.id;
}

function eliminarPedido(id) {
    if (!confirm("¿Eliminar este pedido?")) return;
    const pedidos = obtenerPedidos().filter(p => p.id !== id);
    guardarPedidos(pedidos);
    cargarFiltroVendedores();
    renderTabla();
}

function claseBadge(estado) {
    const mapa = {
        "Pendiente": "badge-pendiente",
        "En proceso": "badge-proceso",
        "Entregado": "badge-entregado",
        "Cancelado": "badge-cancelado"
    };
    return mapa[estado] || "badge-pendiente";
}

function renderTabla() {
    const filtroEstado = document.getElementById("filtroEstado").value;
    const filtroVendedor = document.getElementById("filtroVendedor").value;

    let pedidos = obtenerPedidos().sort((a, b) => b.fecha.localeCompare(a.fecha));

    if (filtroEstado) pedidos = pedidos.filter(p => p.estado === filtroEstado);
    if (filtroVendedor) pedidos = pedidos.filter(p => p.vendedor === filtroVendedor);

    const tbody = document.getElementById("tablaPedidos");
    tbody.innerHTML = "";

    pedidos.forEach(p => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
            <td>${p.fecha}</td>
            <td>${p.cliente}</td>
            <td>${p.producto}</td>
            <td>${p.cantidad}</td>
            <td>S/ ${p.total.toFixed(2)}</td>
            <td>${p.vendedor}</td>
            <td><span class="badge ${claseBadge(p.estado)}">${p.estado}</span></td>
            <td class="acciones">
                <button onclick="editarPedido(${p.id})">Editar</button>
                <button onclick="eliminarPedido(${p.id})">Eliminar</button>
            </td>
        `;
        tbody.appendChild(fila);
    });
}

cargarClientesEnSelect();
cargarFiltroVendedores();
renderTabla();
</script>

</body>
</html>
