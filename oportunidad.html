<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Oportunidad</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <a class="volver" href="dashboard.html">&larr; Volver al Dashboard</a>

    <h2>Registrar Oportunidad de Venta</h2>

    <form>

        <label>Cliente</label>
        <input type="text" required>

        <label>Producto</label>
        <select>
            <option>Leche Gloria</option>
            <option>Yogurt Gloria</option>
            <option>Queso Gloria</option>
        </select>

        <label>Monto</label>
        <input type="number">

        <label>Fecha de cierre</label>
        <input type="date">

        <label>Estado</label>
        <select>
            <option>Nuevo</option>
            <option>En proceso</option>
            <option>Ganado</option>
            <option>Perdido</option>
        </select>

        <label>Observaciones</label>
        <textarea></textarea>

        <button type="submit">Guardar</button>

    </form>

</div>

</body>
</html>
